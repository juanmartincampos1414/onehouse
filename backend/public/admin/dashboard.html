<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One House — Panel de administración</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="dash">
    <div class="dash-header">
      <h1>Panel de administración</h1>
      <button class="btn-out" id="logoutBtn">Cerrar sesión</button>
    </div>

    <!-- Precio -->
    <div class="section">
      <h2>Precio y duración</h2>
      <div class="row">
        <div class="field">
          <label>Precio inicial (US$)</label>
          <input type="number" id="basePrice" min="0" step="1000">
        </div>
        <div class="field">
          <label>Baja diaria (%)</label>
          <input type="number" id="dailyDropPercent" min="0" max="100" step="0.1">
        </div>
      </div>
      <div class="field">
        <label>Días de publicación</label>
        <input type="number" id="totalDays" min="1" max="90">
      </div>
      <p class="video-current" id="cycleInfo"></p>
      <div class="actions">
        <button class="btn-danger" id="restartBtn" type="button">Reiniciar ciclo (nueva publicación, Día 1)</button>
      </div>
    </div>

    <!-- Descripción y características -->
    <div class="section">
      <h2>Descripción y características</h2>
      <div class="field">
        <label>Descripción de la propiedad</label>
        <textarea id="description"></textarea>
      </div>
      <div class="field">
        <label>Característica 1</label>
        <input type="text" id="feature0">
      </div>
      <div class="field">
        <label>Característica 2</label>
        <input type="text" id="feature1">
      </div>
      <div class="field">
        <label>Característica 3</label>
        <input type="text" id="feature2">
      </div>
      <div class="field">
        <label>Característica 4</label>
        <input type="text" id="feature3">
      </div>
    </div>

    <!-- Fotos -->
    <div class="section">
      <h2>Fotos de la propiedad</h2>
      <div class="photos-grid" id="photosGrid"></div>
      <input type="file" id="photoInput" accept="image/*" multiple>
    </div>

    <!-- Video -->
    <div class="section">
      <h2>Video del recorrido completo</h2>
      <p class="video-current" id="videoCurrent">Sin video cargado</p>
      <input type="file" id="videoInput" accept="video/*">
    </div>

    <div class="actions">
      <button class="btn-save" id="saveBtn">Guardar cambios</button>
    </div>

    <!-- Interesados -->
    <div class="section">
      <h2>Interesados (leads)</h2>
      <table id="leadsTable">
        <thead>
          <tr><th>Nombre</th><th>Apellido</th><th>WhatsApp</th><th>Fecha</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast">Cambios guardados</div>

  <script src="admin.js"></script>
</body>
</html>
